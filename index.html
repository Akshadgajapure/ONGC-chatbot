<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONGC AI Assistant</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
        }

        .app {
            width: 100%;
            height: 100vh;
            display: flex;
        }

        /* ===================== SIDEBAR ===================== */

        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: #1f1f1f;
            color: #eee;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: margin-left 0.2s ease;
        }

        .sidebar.collapsed {
            margin-left: -280px;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #333;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
        }

        .new-chat-btn:hover { background: #dc2626; border-color: #dc2626; }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .conversation-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            font-size: 13.5px;
            color: #ccc;
            transition: background 0.15s;
        }

        .conversation-item:hover { background: #2c2c2c; }

        .conversation-item.active {
            background: #3a1414;
            color: #fff;
            border-left: 3px solid #dc2626;
            padding-left: 9px;
        }

        .conversation-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .conversation-delete {
            opacity: 0;
            background: none;
            border: none;
            color: #999;
            font-size: 15px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .conversation-item:hover .conversation-delete { opacity: 1; }
        .conversation-delete:hover { color: #fff; background: #dc2626; }

        .sidebar-empty {
            color: #777;
            font-size: 13px;
            text-align: center;
            padding: 24px 12px;
        }

        .sidebar-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .sidebar-toggle:hover { background: rgba(255,255,255,0.15); }

        /* ===================== MAIN CHAT ===================== */

        .container {
            flex: 1;
            min-width: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #c91c1c;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-logo {
            height: 64px;
            width: auto;
            background: white;
            border-radius: 8px;
            padding: 6px 10px;
            flex-shrink: 0;
        }

        .header-text h1 { font-size: 26px; }
        .header-text p { margin-top: 4px; font-size: 13px; opacity: 0.9; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
        }

        .user { justify-content: flex-end; }
        .assistant { justify-content: flex-start; }

        .message-content {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
        }

        .user .message-content {
            background: #dc2626;
            color: white;
        }

        .assistant .message-content {
            background: #eeeeee;
            color: #222;
        }

        .assistant .message-content p {
            margin-bottom: 8px;
        }

        .assistant .message-content ul {
            margin: 8px 0 8px 20px;
        }

        .assistant .message-content li {
            margin-bottom: 4px;
        }

        .assistant .message-content strong {
            color: #111;
        }

        .sources {
            margin-top: 10px;
            background: #fafafa;
            padding: 10px;
            border-left: 4px solid #dc2626;
            border-radius: 6px;
            font-size: 13px;
        }

        .source-item {
            margin-top: 5px;
        }
        .source-item a {
            color: #dc2626;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.15s;
        }
        .source-item a:hover {
            color: #991b1b;
            text-decoration: underline;
        }
        .source-item a::before {
            content: "📄";
            font-size: 13px;
        }

        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 30px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #dc2626;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 30px;
            background: #dc2626;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover { background: #991b1b; }
        button:disabled { background: #aaa; cursor: not-allowed; }

        .welcome {
            text-align: center;
            margin-top: 100px;
            color: #666;
        }

        .thinking {
            color: #999;
            font-style: italic;
        }
    </style>
</head>

<body>

<div class="app">

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="startNewChat()">
                ＋ New Chat
            </button>
        </div>
        <div class="conversation-list" id="conversationList">
            <div class="sidebar-empty">No conversations yet</div>
        </div>
    </div>

<div class="container">

    <div class="header">
       <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle chat history">☰</button>
       <img
    class="header-logo"
    src="ongc_logo.png"
    alt="ONGC Logo"
>
        <div class="header-text">
            <h1>Corrosion Knowledge Assistant</h1>
            <p>Ask questions from ONGC PDFs and documents</p>
        </div>
    </div>

    <div class="messages" id="messages">
        <div class="welcome">
            <h2>Welcome to Corrosion PRCI Assistant</h2>
            <br>
            <p>Ask anything about corrosion, ONGC documents, safety, operations, etc.</p>
        </div>
    </div>

    <div class="input-area">
        <input
            type="text"
            id="messageInput"
            placeholder="Ask something..."
            onkeypress="handleKeyPress(event)"
        >
        <button onclick="sendMessage()" id="sendBtn">Send</button>
    </div>

</div>

</div>

<script>

    // ✅ Fixed: Points to Flask backend
    const API_URL = "";

    let currentConversationId = null;
    let conversationsCache = [];

    function escapeHtml(text) {
        const map = {
            '&': '&amp;', '<': '&lt;', '>': '&gt;',
            '"': '&quot;', "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    function formatText(text) {
        // Strip ALL markdown FIRST before splitting
        text = text.replace(/\*\*([^*\n]+)\*\*/g, '$1');
        text = text.replace(/\*([^*\n]+)\*/g, '$1');
        text = text.replace(/__(.*?)__/g, '$1');
        text = text.replace(/^#{1,6}\s*/gm, '');
        text = text.replace(/`([^`]+)`/g, '$1');

        let lines = text.split('\n');
        let html = '';
        let inList = false;

        for (let line of lines) {
            line = line.trim();
            if (!line) {
                if (inList) { html += '</ul>'; inList = false; }
                html += '<br>';
                continue;
            }
            // Bullet points: lines starting with • - * 
            if (/^[•\-\*]\s/.test(line)) {
                if (!inList) { html += '<ul>'; inList = true; }
                html += `<li>${line.replace(/^[•\-\*]\s/, '')}</li>`;
            }
            // Numbered list
            else if (/^\d+\.\s/.test(line)) {
                if (!inList) { html += '<ul>'; inList = true; }
                html += `<li>${line.replace(/^\d+\.\s/, '')}</li>`;
            }
            // Heading-like lines (short, ending with colon)
            else if (line.endsWith(':') && line.length < 80) {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<p><strong>${line}</strong></p>`;
            }
            else {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<p>${line}</p>`;
            }
        }
        if (inList) html += '</ul>';
        return html;
    }

    function addMessage(role, content, sources = []) {
        const messagesDiv = document.getElementById("messages");

        const welcome = messagesDiv.querySelector(".welcome");
        if (welcome) welcome.remove();

        const messageDiv = document.createElement("div");
        messageDiv.className = `message ${role}`;

        let html = `<div class="message-content">`;
        if (role === 'user') {
            html += escapeHtml(content);
        } else {
            html += formatText(content);
        }

        if (role === "assistant" && sources.length > 0) {
            html += `<div class="sources"><strong>Sources:</strong>`;
            sources.forEach((source, index) => {
                // source is just the filename e.g. "myfile.pdf"
                const encoded  = encodeURIComponent(source);
                const url      = `${API_URL}/pdf/${encoded}`;
                const label    = source.replace(/\.pdf$/i, "");
                html += `<div class="source-item">
                    ${index + 1}.
                    <a href="${url}" target="_blank" title="Open ${escapeHtml(source)}">
                        ${escapeHtml(label)}
                    </a>
                </div>`;
            });
            html += `</div>`;
        }

        html += `</div>`;
        messageDiv.innerHTML = html;
        messagesDiv.appendChild(messageDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addThinking() {
        const messagesDiv = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message assistant";
        div.id = "thinking";
        div.innerHTML = `<div class="message-content thinking">Thinking...</div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeThinking() {
        const t = document.getElementById("thinking");
        if (t) t.remove();
    }

    async function sendMessage() {
        const input = document.getElementById("messageInput");
        const message = input.value.trim();
        if (!message) return;

        addMessage("user", message);
        input.value = "";

        const button = document.getElementById("sendBtn");
        button.disabled = true;
        addThinking();

        try {
            const response = await fetch(`${API_URL}/api/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: message,
                    conversation_id: currentConversationId
                })
            });

            const data = await response.json();
            removeThinking();
            addMessage("assistant", data.message, data.sources || []);

            if (data.conversation_id) {
                const isNewConversation = currentConversationId !== data.conversation_id;
                currentConversationId = data.conversation_id;
                await loadConversationList();
                setActiveConversationInSidebar(currentConversationId);
            }

        } catch (error) {
            console.error(error);
            removeThinking();
            addMessage("assistant", "Backend connection error. Make sure Flask is running.");
        }

        button.disabled = false;
        input.focus();
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }

    // ===================== SIDEBAR / CHAT HISTORY =====================

    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("collapsed");
    }

    function showWelcomeScreen() {
        const messagesDiv = document.getElementById("messages");
        messagesDiv.innerHTML = `
            <div class="welcome">
                <h2>Welcome to Corrosion PRCI Assistant</h2>
                <br>
                <p>Ask anything about corrosion, ONGC documents, safety, operations, etc.</p>
            </div>`;
    }

    function startNewChat() {
        currentConversationId = null;
        showWelcomeScreen();
        setActiveConversationInSidebar(null);
        document.getElementById("messageInput").focus();
    }

    function setActiveConversationInSidebar(conversationId) {
        document.querySelectorAll(".conversation-item").forEach(el => {
            el.classList.toggle("active", el.dataset.id === conversationId);
        });
    }

    function renderConversationList() {
        const listDiv = document.getElementById("conversationList");

        if (!conversationsCache.length) {
            listDiv.innerHTML = `<div class="sidebar-empty">No conversations yet</div>`;
            return;
        }

        listDiv.innerHTML = "";
        conversationsCache.forEach(conv => {
            const item = document.createElement("div");
            item.className = "conversation-item";
            item.dataset.id = conv.id;
            if (conv.id === currentConversationId) item.classList.add("active");

            item.innerHTML = `
                <span class="conversation-title" title="${escapeHtml(conv.title)}">${escapeHtml(conv.title)}</span>
                <button class="conversation-delete" title="Delete conversation">✕</button>
            `;

            item.querySelector(".conversation-title").addEventListener("click", () => {
                openConversation(conv.id);
            });

            item.querySelector(".conversation-delete").addEventListener("click", (e) => {
                e.stopPropagation();
                deleteConversation(conv.id);
            });

            listDiv.appendChild(item);
        });
    }

    async function loadConversationList() {
        try {
            const response = await fetch(`${API_URL}/api/conversations`);
            const data = await response.json();
            conversationsCache = data.conversations || [];
            renderConversationList();
        } catch (error) {
            console.error("Failed to load conversations:", error);
        }
    }

    async function openConversation(conversationId) {
        if (conversationId === currentConversationId) return;

        try {
            const response = await fetch(`${API_URL}/api/conversations/${conversationId}`);
            if (!response.ok) throw new Error("Conversation not found");
            const data = await response.json();

            currentConversationId = conversationId;
            const messagesDiv = document.getElementById("messages");
            messagesDiv.innerHTML = "";

            if (!data.messages || data.messages.length === 0) {
                showWelcomeScreen();
            } else {
                data.messages.forEach(msg => {
                    addMessage(msg.role, msg.content, msg.sources || []);
                });
            }

            setActiveConversationInSidebar(conversationId);
        } catch (error) {
            console.error("Failed to open conversation:", error);
        }
    }

    async function deleteConversation(conversationId) {
        if (!confirm("Delete this conversation? This cannot be undone.")) return;

        try {
            await fetch(`${API_URL}/api/conversations/${conversationId}`, { method: "DELETE" });

            if (conversationId === currentConversationId) {
                startNewChat();
            }

            await loadConversationList();
        } catch (error) {
            console.error("Failed to delete conversation:", error);
        }
    }

    // Load chat history sidebar on page load
    loadConversationList();

</script>

</body>
</html>
